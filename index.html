<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Kanbear</title>
    <link rel="stylesheet" href="src/assets/kanbear.css">
    <link rel="stylesheet" href="src/assets/kanban.css">
    <script type="module" src="src/index.mjs"></script>
    <!-- <script type="module" src="src/report.mjs"></script> -->
</head>

<body>
    <div><b>Kanbear</b>&nbsp;<a id="kanboard" target="kanboard">kanboard</a></div>
    <!-- Filtres Regex -->
    <div class="filters">
        <!-- Filtres Regex -->
        

        <div id="kanbearWorkspacesDiv" class="filter-group">
        </div>

       <div id="kanbearProjectsDiv" class="filter-group">
        </div>
        
        <!--
        <div id="projectsDiv" class="filter-group">
            <label for="projects">kanboard project</label>
            <select name="project" id="projectsSelectBox">
             </select>
        </div>
    -->

        <div class="filter-group">
            <label for="project">ProjectBoxFilter</label>
            <input type="text" id="projectFilter" placeholder=".*">
        </div>


        <div class="filter-group">
            <label for="swimLane">Swimlane</label>
            <input type="text" id="swimlaneFilter" placeholder=".*">
        </div>
        <div class="filter-group">
            <label for="taskFilter">Task</label>
            <input type="text" id="taskFilter" placeholder=".*">
        </div>
        <div class="filter-group">
            <label for="columnFilter">Column</label>
            <input type="text" id="columnFilter" placeholder=".*">
        </div>
        <div class="filter-group">
            <label for="assigneeFilter">Assignee (WIP dont use !)</label>
            <input type="text" id="assigneeFilter" placeholder=".*">
        </div>

    </div>


    <!-- Affichage du JSON -->
    <div class="message" id="message">
        <p></p>
    </div>
    <!-- Boutons d'Actions -->
    <div class="content">
        <div class="actions">
            <button id="migrate">Migrate</button>
            <button id="loadJson">Load project</button>
            <button id="showDetails">List</button>
            <button id="kanban">Kanban</button>
            <button id="showEvents">Events</button>
            <button id="clearProjects">Clear project</button>
        </div>

        
        <!-- Résultats -->
                <!-- Résultats -->
        <div class="results scroller" id="results">
        </div>

    </div>

    <!-- Popup (masquée par défaut) -->
    <div id="editPopup" class="popup">
        <div class="popup-content">
            <span class="close">&times;</span>
            <h2>Comment task <span id="popupTaskId"></span></h2>
            <textarea id="taskNotes" rows="5" placeholder="Comment ..."></textarea>
            <button id="saveNotes">Save</button>
        </div>
    </div>

    <!-- Popup pour ajouter/éditer une tâche -->
    <div id="taskPopup" class="popup">
        <div class="popup-content">
            <span class="close">&times;</span>
            <h2 id="popupTitle">Ajouter une tâche</h2>
            <input type="text" id="taskTitle" placeholder="Titre de la tâche" autocomplete="off">
            <textarea id="taskDescription" placeholder="Description..." rows="3"></textarea>
            <button id="saveTaskBtn">Enregistrer</button>
        </div>
    </div>


</body>

</html>
