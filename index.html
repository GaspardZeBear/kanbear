<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Kanbear</title>
    <link rel="stylesheet" href="src/assets/kanbear.css">
    <link rel="stylesheet" href="src/assets/kanban.css">
    <link rel="stylesheet" href="src/assets/menu.css">
    <script type="module" src="src/index.mjs"></script>
    <!-- <script type="module" src="src/report.mjs"></script> -->
</head>

<body>

    <div class="topbar" id="workspaceAndProject">
        <div class="topbar-name">
            <h1 style="margin-top: 0;">Kanbear</h1>
        </div>
        <!-- https://www.pierre-giraud.com/html-css-apprendre-coder-cours/creation-menu-deroulant/ -->
        <div id="dropdown">
            <nav>
                <ul>
                    <li class="dropdown"><a href="#">People</a>
                        <ul class="under">
                            <li><a href="#">Users</a></li>
                            <li><a href="#" id="assigneePanel">Assignees</a></li>
                        </ul>
                    </li>
                    <li class="dropdown"><a href="#">Tags</a>
                        <ul class="under">
                            <li><a href="#">Tags management</a></li>
                        </ul>
                    </li>
                    <li class="dropdown"><a href="#">Kanboard</a>
                        <ul class="under">
                            <li><a id="kanboard" target="kanboard">Open kanboard</a></li>
                            <!-- <li><a href="#">Migrate</a></li> -->
                            <li><span id="migrateFromKanboard">Migrate</span></li>
                        </ul>
                    </li>
                    <li class="dropdown"><a href="#">Contact</a>
                        <ul class="under">
                            <li><a href="#">gaspardzebear@hotmail.fr</a></li>
                        </ul>
                    </li>
                    <li class="dropdown"><a href="#">About</a>
                        <ul class="under">
                            <li><a href="#">Kanbear, powered by Gzb Ltd.</a></li>
                        </ul>
                    </li>
                </ul>
            </nav>
        </div>
    </div>

    <!-- Working items -->
    <div class="topbar">
        <div class="topbar-name">
            <h3 style="margin-top:0px">Working on</h3>
        </div>
        <div id="kanbearWorkspacesDiv">
        </div>
        <div id="kanbearProjectsDiv">
        </div>
        <div class="infos">
            <b>Workspace</b>
        </div>
        <div class="infos" id="workspace">
            <p>No selection</p>
        </div>
        <div class="infos">
            <b>Status</b>
        </div>
        <div class="infos" id="message">
        </div>
    </div>

    <!-- Filtres Regexp -->
    <div class="topbar">
        <div class="topbar-name">
            <h3 style="margin-top:0px">Filters</h3>
        </div>

        <div class="filter-group">
            <label for="project">Project</label>
            <input type="text" id="projectFilter" placeholder=".*">
        </div>
        <div class="filter-group">
            <label for="swimLane">Swimlane</label>
            <input type="text" id="swimlaneFilter" placeholder=".*">
        </div>
        <div class="filter-group">
            <label for="taskFilter">Task</label>
            <input type="text" id="taskFilter" placeholder=".*">
        </div>
        <div class="filter-group">
            <label for="columnFilter">Column</label>
            <input type="text" id="columnFilter" placeholder=".*">
        </div>
        <div class="filter-group">
            <label for="assigneeFilter">Assignee (WIP dont use !)</label>
            <input type="text" id="assigneeFilter" placeholder=".*">
        </div>

    </div>

    <!-- Boutons d'Actions -->
    <div class="content">
        <div class="actions">
            <!-- <button id="migrate">Migrate From Kanboard</button> -->
            <button id="loadJson">Load project</button>
            <button id="showDetails">List Workspace</button>
            <button id="kanban">Kanban Project</button>
            <button id="showEvents">Events</button>
            <button id="clearProjects">Clear project</button>
        </div>


        <!-- Résultats -->
        <div class="resultsClass">
            <div id="resultsHeader">
                <p>Result Header</p>
            </div>
            <div class="results scroller" id="results">
            </div>
        </div>

    </div>

    <!-- Div for modal dialogs -->
    <div id="modal">
    </div>

    <dialog id="assigneeDialog" closedby="any">
        <h2 id="assigneeDialogTitle"></h2>
        <div id="assigneeDialogMessage"></div>
        <form id="assigneeForm" method="dialog">
            <div id="assigneeNameDiv">
                <label for="name">Assignee Name: </label>
                <input type="text" id="assigneeName" name="assigneeName" />
            </div>
            <div id="assigneeDescriptionDiv">
                <label for="assignee">Description: </label>
                <input type="text" id="assigneeDescription" name="assigneeDescription" />
            </div>
            <div id="assigneeTelDiv">
                <label for="assignee">Tel: </label>
                <input type="text" id="assigneeTel" name="assigneeTel" />
            </div>
            <div id="assigneeEmailDiv">
                <label for="assignee">Email: </label>
                <input type="text" id="assigneeEmail" name="assigneeEmail" />
            </div>
            <button type="button" value="save" name="saveAssigneeBtn" id="saveAssigneeBtn">Save</button>
            <button type="button" value="cancel" name="cancelAssigneeBtn" id="cancelAssigneeBtn">Cancel</button>
        </form>
    </dialog>

    <dialog id="workspaceDialog" closedby="any">
        <h2 id="workspaceDialogTitle"></h2>
        <div id="workspaceDialogMessage"></div>
        <form id="workspaceForm" method="dialog">
            <div id="workspaceNameDiv">
                <label for="name">Workspace Name: </label>
                <input type="text" id="workspaceName" name="workspaceName" />
            </div>
            <div id="workspaceDescriptionDiv">
                <label for="description">Description: </label>
                <input type="text" id="workspaceDescription" name="workspaceDescription" />
            </div>
            <div id="workspaceIsOpenDiv">
                <label for="isOpen">Open </label>
                <input type="checkbox" id="workspaceIsOpen" checked />
            </div>
            <button type="button" value="save" name="saveWorkspaceBtn" id="saveWorkspaceBtn">Save</button>
            <button type="button" value="cancel" name="cancelWorkspaceBtn" id="cancelWorkspaceBtn">Cancel</button>
        </form>
    </dialog>

    <dialog id="projectDialog" closedby="any">
        <h2 id="projectDialogTitle"></h2>
        <div id="projectDialogMessage"></div>
        <form id="projectForm" method="dialog">
            <div id="projectNameDiv">
                <label for="name">Project Name: </label>
                <input type="text" id="projectName" name="projectName" />
            </div>
            <div id="projectDescriptionDiv">
                <label for="description">Description: </label>
                <input type="text" id="projectDescription" name="projectDescription" />
            </div>
            <div id="columnsDiv">
            </div>
            <div id="projectColorDiv"></div>
            <div id="projectIsOpenDiv">
                <label for="projectIsOpen">Open </label>
                <input type="checkbox" id="projectIsOpen" checked />
            </div>
            <button type="button" value="save" name="saveProjectBtn" id="saveProjectBtn">Save</button>
            <button type="button" value="cancel" name="cancelProjectBtn" id="cancelProjectBtn">Cancel</button>
        </form>
    </dialog>

    <dialog id="swimlaneDialog" closedby="any">
        <h2 id="swimlaneDialogTitle"></h2>
        <div id="swimlaneDialogMessage"></div>
        <form id="swimlaneForm" method="dialog">
            <div id="swimlaneNameDiv">
                <label for="name">Swimlane Name: </label>
                <input type="text" id="swimlaneName" name="swimlaneName" />
            </div>
            <div id="swimlaneDescriptionDiv">
                <label for="description">Description: </label>
                <input type="text" id="swimlaneDescription" name="swimlaneDescription" />
            </div>
            <div id="swimlaneIsOpenDiv">
                <label for="isOpen">Open </label>
                <input type="checkbox" id="swimlaneIsOpen" checked />
            </div>
            <button type="button" value="save" name="saveSwimlaneBtn" id="saveSwimlaneBtn">Save</button>
            <button type="button" value="cancel" name="cancelSwimlaneBtn" id="cancelSwimlaneBtn">Cancel</button>
        </form>
    </dialog>

    <dialog id="columnDialog" closedby="any">
        <h2 id="columnDialogTitle"></h2>
        <div id="columnDialogMessage"></div>
        <form id="columnForm" method="dialog">
            <div id="columnNameDiv">
                <label for="name">Column Name: </label>
                <input type="text" id="columnName" name="name" />
            </div>
            <div id="columnDescriptionDiv">
                <label for="description">Description: </label>
                <input type="text" id="columnDescription" name="column" />
            </div>
            <div id="columnColorDiv">
            </div>
            <button type="button" value="save" name="saveColumnBtn" id="saveColumnBtn">Save</button>
            <button type="button" value="cancel" name="cancelColumnBtn" id="cancelColumnBtn">Cancel</button>
        </form>
    </dialog>

    <dialog id="taskDialog" closedby="any">
        <h2 id="taskDialogTitle"></h2>
        <div id="taskDialogMessage"></div>
        <form id="taskForm" method="dialog">
            <div id="taskNameDiv">
                <label for="name">Task Name: </label>
                <input type="text" id="taskName" name="taskName" />
            </div>
            <div id="taskDescriptionDiv">
                <label for="description">Description: </label>
                <input type="text" id="taskDescription" name="taskDescription" />
            </div>
            <div id="taskNoteDiv">
                <label for="note">Note: </label>
                <input type="text" id="taskNote" name="taskNote" />
            </div>
            <div id="taskAssigneeDiv">
                <!--    <label for="assignee">Assignee: </label>
                <select id="taskAssignee" name="taskAssignee">
                    <option value="0">toto</option>
                    <option value="1">titi</option>
                </select>
            -->
            </div>
            <div id="taskColorDiv">
            </div>
            <div id="taskIs_openDiv">
                <label for="is_open">Open </label>
                <input type="checkbox" id="taskIsOpen" name="taskIsOpen" value="1" />
            </div>
            <div id="taskDateDueDiv">
                <label for="due">Due date</label>
                <input type="date" id="taskDateDue" name="taskDateDue"></input>
            </div>
            <div id="taskTimeDueDiv">
                <label for="due">Due time</label>
                <input type="time" id="taskTimeDue" name="taskTimeDue"></input>
            </div>
            <!-- div id="taskDateTimeDueDiv">
                <label for="due">Due time</label>
                <input type="datetime-local" id="taskDateTimeDue" name="taskDateTimeDue"></input>
            </div-->
            <button type="button" value="save" name="saveTaskBtn" id="saveTaskBtn">Save</button>
            <button type="button" value="cancel" name="cancelTaskBtn" id="cancelTaskBtn">Cancel</button>
        </form>
    </dialog>

</body>

</html>
