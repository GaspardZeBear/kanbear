<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Kanbear</title>
    <link rel="stylesheet" href="src/assets/kanbear.css">
    <script type="module" src="src/index.mjs"></script>
    <script type="module" src="src/report.mjs"></script>
</head>

<body>
    <div><b>Kanbear</b>&nbsp;<a id="kanboard" target="kanboard">kanboard</a></div>

    <!-- Filtres Regex -->
    <div class="filters">
        <div class="filter-group">
            <label for="project">Project</label>
            <input type="text" id="projectFilter" placeholder=".*">
        </div>
        <div class="filter-group">
            <label for="swimLane">Swimlane</label>
            <input type="text" id="swimlaneFilter" placeholder=".*">
        </div>
        <div class="filter-group">
            <label for="taskFilter">Task</label>
            <input type="text" id="taskFilter" placeholder=".*">
        </div>
        <div class="filter-group">
            <label for="columnFilter">Column</label>
            <input type="text" id="columnFilter" placeholder=".*">
        </div>
        <div class="filter-group">
            <label for="assigneeFilter">Assignee (WIP dont use !)</label>
            <input type="text" id="assigneeFilter" placeholder=".*">
        </div>

    </div>


    <!-- Affichage du JSON -->
    <div class="message" id="message">
        <p>No projects loaded.</p>
    </div>
    <!-- Boutons d'Actions -->
    <div class="content">
        <div class="actions">
            <button id="loadJson">Load projects</button>
            <button id="showDetails">List</button>
            <button id="showBoard">Board</button>
            <button id="showEvents">Events</button>
            <button id="clearProjects">Clear projects</button>
        </div>
        <!-- Popup (masquée par défaut) -->
        <div id="editPopup" class="popup">
            <div class="popup-content">
                <span class="close">&times;</span>
                <h2>Comment task <span id="popupTaskId"></span></h2>
                <textarea id="taskNotes" rows="5" placeholder="Comment ..."></textarea>
                <button id="saveNotes">Save</button>
            </div>
        </div>

        <!-- Résultats -->
        <div class="results" id="results">
        </div>
    </div>


</body>

</html>
